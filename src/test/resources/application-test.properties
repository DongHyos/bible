spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

logging.level.org.springframework.orm.jpa=DEBUG
logging.level.org.springframework.transaction=DEBUG

# App 설정 (webConfig Bean에서 필요)
app.option.meta=true
app.option.trace=false
app.option.uuid=false
app.option.errors=true
app.option.exception=true
app.option.report=false
app.transaction-log.error-only=false
app.transaction-log.use-masking=false
app.upload.image-dir=/tmp/test-upload
app.upload.domain=localhost:8080

# ElasticSearch 테스트 설정 (Testcontainers 또는 임베디드 ElasticSearch 사용)
spring.elasticsearch.uris=http://localhost:9200
spring.elasticsearch.connection-timeout=10s
spring.elasticsearch.socket-timeout=30s

# ElasticSearch 자동 설정 비활성화 (테스트에서 필요시)
# spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration